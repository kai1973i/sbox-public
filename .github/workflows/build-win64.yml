name: Build Windows x64

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore Dependencies
      working-directory: engine
      run: dotnet restore Sandbox-Engine.slnx

    - name: Build Solution
      working-directory: engine
      run: dotnet build Sandbox-Engine.slnx --configuration ${{ matrix.configuration }} --no-restore -p:Platform="x64"

    - name: Run Unit Tests
      working-directory: engine
      run: dotnet test Sandbox-Engine.slnx --configuration ${{ matrix.configuration }} --no-build --verbosity normal

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sbox-win64-${{ matrix.configuration }}
        path: |
          engine/**/bin/${{ matrix.configuration }}/net*/**
        retention-days: 30
